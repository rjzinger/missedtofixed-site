<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e3a5f">
<title>David &amp; the Giant &mdash; A Bible Match-3 Game</title>
<meta name="description" content="David &amp; the Giant: a free, faith-based match-3 puzzle game for kids ages 8-12. Sling smooth stones, defeat Goliath, and follow the story of 1 Samuel 17.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gap: 4px;
    --tile-radius: 14px;
    --ink: #1f2937;
    --gold: #f59e0b;
    --gold-deep: #b45309;
    --sky-1: #bfe3ff;
    --sky-2: #fef3c7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    font-family: "Baloo 2", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, var(--sky-1) 0%, #d9efff 35%, #fff7e6 70%, #f4e2b8 100%);
    -webkit-user-select: none; user-select: none;
  }
  #app {
    position: relative;
    height: 100dvh;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 16px 16px;
    transition: opacity .25s ease;
  }
  .hidden { opacity: 0; pointer-events: none; }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none; border: none;
    font-family: inherit; font-weight: 800;
    font-size: 1.15rem;
    color: #fff;
    background: linear-gradient(180deg, #fbbf24, var(--gold-deep));
    padding: .85rem 1.8rem;
    border-radius: 999px;
    box-shadow: 0 5px 0 #92400e, 0 8px 16px rgba(0,0,0,.2);
    cursor: pointer;
    transition: transform .06s ease, box-shadow .06s ease;
    letter-spacing: .01em;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #92400e, 0 3px 8px rgba(0,0,0,.2); }
  .btn.secondary {
    background: linear-gradient(180deg, #e0f2fe, #bae6fd);
    color: #075985;
    box-shadow: 0 5px 0 #7dd3fc, 0 8px 16px rgba(0,0,0,.12);
    font-size: 1rem; padding: .7rem 1.4rem;
  }
  .btn.secondary:active { box-shadow: 0 1px 0 #7dd3fc; }
  .btn.small { font-size: .95rem; padding: .55rem 1.1rem; box-shadow: 0 4px 0 #92400e; }

  /* ---------- Start screen ---------- */
  #startScreen { justify-content: center; gap: 18px; text-align: center; }
  .logo-giant { font-size: clamp(4rem, 22vw, 7rem); line-height: 1; filter: drop-shadow(0 8px 10px rgba(0,0,0,.25)); animation: sway 3s ease-in-out infinite; }
  @keyframes sway { 0%,100%{ transform: rotate(-3deg);} 50%{ transform: rotate(3deg);} }
  h1.title {
    margin: 0;
    font-size: clamp(2.4rem, 11vw, 3.6rem);
    line-height: .95;
    color: var(--gold-deep);
    text-shadow: 0 3px 0 #fff, 0 4px 0 #fcd34d, 0 6px 10px rgba(0,0,0,.18);
  }
  .subtitle { margin: 0; font-size: 1.05rem; color: #4b5563; font-weight: 600; max-width: 320px; }
  .verse-ref { font-size: .9rem; color: var(--gold-deep); font-weight: 700; letter-spacing: .04em; }
  .start-actions { display: flex; flex-direction: column; gap: 12px; align-items: center; margin-top: 6px; }
  .toprow { position: absolute; top: calc(env(safe-area-inset-top) + 10px); right: 14px; display: flex; gap: 10px; }
  .icon-btn {
    appearance: none; border: none; cursor: pointer;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,.7);
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
    font-size: 1.25rem; line-height: 44px; text-align: center;
  }
  .credit { position: absolute; bottom: 12px; font-size: .78rem; color: #6b7280; }
  .credit a { color: var(--gold-deep); text-decoration: none; }

  /* ---------- Game screen ---------- */
  #gameScreen { justify-content: flex-start; padding-top: calc(env(safe-area-inset-top) + 8px); }
  .hud {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .hud .stat {
    background: rgba(255,255,255,.75);
    border-radius: 14px; padding: 5px 12px; text-align: center; min-width: 64px;
    box-shadow: 0 2px 5px rgba(0,0,0,.08);
  }
  .hud .stat .label { font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: #6b7280; font-weight: 700; }
  .hud .stat .value { font-size: 1.25rem; font-weight: 800; color: var(--ink); }
  .hud .stat .value.low { color: #dc2626; }

  /* Goliath / battle area */
  .battle {
    width: 100%;
    background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.2));
    border-radius: 18px;
    padding: 8px 12px 10px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .giant-wrap { position: relative; text-align: center; flex-shrink: 0; }
  .giant { font-size: 3rem; line-height: 1; display: inline-block; }
  .giant.hit { animation: shake .35s; }
  @keyframes shake {
    0%,100%{ transform: translateX(0) rotate(0); }
    20%{ transform: translateX(-6px) rotate(-6deg); }
    40%{ transform: translateX(6px) rotate(6deg); }
    60%{ transform: translateX(-4px) rotate(-3deg); }
    80%{ transform: translateX(4px) rotate(3deg); }
  }
  .giant.defeated { animation: topple 1s forwards; }
  @keyframes topple { to { transform: rotate(95deg) translateY(20px); opacity: .25; } }
  .hp-block { flex: 1; }
  .hp-name { font-size: .85rem; font-weight: 800; color: #7f1d1d; display: flex; justify-content: space-between; }
  .hp-track { height: 16px; background: #fee2e2; border-radius: 999px; overflow: hidden; box-shadow: inset 0 2px 3px rgba(0,0,0,.15); margin-top: 3px; }
  .hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ef4444, #b91c1c); border-radius: 999px; transition: width .4s cubic-bezier(.2,.8,.2,1); }
  .david { font-size: 2rem; flex-shrink: 0; }
  .david.throw { animation: throwAnim .4s; }
  @keyframes throwAnim { 50%{ transform: translateY(-8px) rotate(-12deg) scale(1.1); } }

  /* Board */
  #boardWrap { position: relative; margin: 0 auto; }
  #board { position: relative; }
  .tile {
    position: absolute;
    top: 0; left: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--tile-radius);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.18);
    transition: transform .3s cubic-bezier(.25,.9,.35,1.2);
    will-change: transform;
    cursor: pointer;
  }
  .tile .face { transition: transform .12s ease; pointer-events: none; }
  .tile.sel { box-shadow: 0 0 0 4px #fff, 0 0 0 7px var(--gold), 0 4px 8px rgba(0,0,0,.3); z-index: 5; }
  .tile.sel .face { transform: scale(1.15); }
  .tile.pop { animation: pop .22s forwards; z-index: 6; }
  @keyframes pop { 0%{ transform: var(--pos) scale(1);} 40%{ transform: var(--pos) scale(1.25);} 100%{ transform: var(--pos) scale(0);} }
  .tile.bad { animation: badShake .3s; }
  @keyframes badShake { 0%,100%{} 25%{ margin-left:-4px;} 75%{ margin-left:4px;} }

  .fly-stone { position: absolute; font-size: 1.6rem; z-index: 30; pointer-events: none; transition: transform .45s cubic-bezier(.4,.1,.7,1), opacity .45s ease; }

  /* Toast */
  #toast {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%) scale(.5);
    background: rgba(31,41,55,.92); color: #fff; padding: 10px 22px; border-radius: 999px;
    font-weight: 800; font-size: 1.3rem; opacity: 0; pointer-events: none; z-index: 40;
    box-shadow: 0 6px 20px rgba(0,0,0,.3); white-space: nowrap;
  }
  #toast.show { animation: toast 1.1s ease forwards; }
  @keyframes toast {
    0%{ opacity:0; transform: translate(-50%,-50%) scale(.5);}
    18%{ opacity:1; transform: translate(-50%,-50%) scale(1.08);}
    35%{ transform: translate(-50%,-50%) scale(1);}
    80%{ opacity:1;}
    100%{ opacity:0; transform: translate(-50%,-120%) scale(1);}
  }

  /* ---------- Modal ---------- */
  #modal {
    position: absolute; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15,23,42,.55); backdrop-filter: blur(3px);
    padding: 24px;
    transition: opacity .25s ease;
  }
  .card {
    background: linear-gradient(180deg, #fffdf7, #fff3d6);
    border-radius: 24px; padding: 24px 22px 22px; text-align: center;
    max-width: 380px; width: 100%;
    box-shadow: 0 18px 40px rgba(0,0,0,.35);
    border: 3px solid #fff;
    animation: cardIn .3s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes cardIn { from{ transform: scale(.7); opacity: 0;} to{ transform: scale(1); opacity: 1;} }
  .card .emoji { font-size: 3.2rem; line-height: 1; }
  .card h2 { margin: 8px 0 4px; font-size: 1.7rem; color: var(--gold-deep); }
  .card p { margin: 6px 0; color: #4b5563; font-size: 1.02rem; line-height: 1.5; }
  .scripture {
    background: rgba(180,83,9,.08);
    border-left: 4px solid var(--gold);
    border-radius: 10px;
    padding: 12px 14px; margin: 14px 2px;
    font-style: italic; color: #92400e; text-align: left;
  }
  .scripture .ref { display: block; font-style: normal; font-weight: 800; font-size: .85rem; margin-top: 6px; text-align: right; }
  .card .actions { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 14px; }
  .stars { font-size: 2rem; letter-spacing: .15em; }
</style>
</head>
<body>
<div id="app">

  <!-- ================= START SCREEN ================= -->
  <section id="startScreen" class="screen">
    <div class="toprow">
      <button class="icon-btn" id="muteBtnStart" title="Sound on/off">🔊</button>
    </div>
    <div class="logo-giant">🧌</div>
    <h1 class="title">David<br>&amp; the Giant</h1>
    <p class="subtitle">Sling the smooth stones, topple the giant, and live the story of David &amp; Goliath!</p>
    <p class="verse-ref">— based on 1 Samuel 17 —</p>
    <div class="start-actions">
      <button class="btn" id="playBtn">▶ Play</button>
      <button class="btn secondary" id="continueBtn">Continue</button>
      <button class="btn secondary" id="howBtn">How to Play</button>
    </div>
    <div class="credit">A faith &amp; family game · made with ❤️</div>
  </section>

  <!-- ================= GAME SCREEN ================= -->
  <section id="gameScreen" class="screen hidden">
    <div class="toprow">
      <button class="icon-btn" id="muteBtn" title="Sound on/off">🔊</button>
      <button class="icon-btn" id="homeBtn" title="Home">🏠</button>
    </div>

    <div class="hud">
      <div class="stat"><div class="label">Level</div><div class="value" id="hudLevel">1</div></div>
      <div class="stat"><div class="label">Score</div><div class="value" id="hudScore">0</div></div>
      <div class="stat"><div class="label">Moves</div><div class="value" id="hudMoves">18</div></div>
      <div class="stat"><div class="label">Best</div><div class="value" id="hudBest">0</div></div>
    </div>

    <div class="battle">
      <div class="giant-wrap">
        <div class="giant" id="giant">🧌</div>
      </div>
      <div class="hp-block">
        <div class="hp-name"><span id="giantName">Goliath</span><span id="hpText">0/0</span></div>
        <div class="hp-track"><div class="hp-fill" id="hpFill"></div></div>
      </div>
      <div class="david" id="david">🧒</div>
    </div>

    <div id="boardWrap">
      <div id="board"></div>
      <div id="toast"></div>
    </div>
  </section>

  <!-- ================= MODAL ================= -->
  <div id="modal" class="hidden"></div>

</div>

<script>
(function () {
  "use strict";

  /* ---------------- Config & data ---------------- */
  const COLS = 8, ROWS = 8;
  const TYPES = 5;
  const STONE = 0; // the ammo tile

  const TILE = [
    { emoji: "🪨", bg: "linear-gradient(180deg,#cbd5e1,#94a3b8)" }, // stone (ammo)
    { emoji: "🐑", bg: "linear-gradient(180deg,#fff7d6,#fde68a)" }, // sheep
    { emoji: "🎵", bg: "linear-gradient(180deg,#ddd6fe,#a78bfa)" }, // harp
    { emoji: "👑", bg: "linear-gradient(180deg,#fecaca,#f87171)" }, // crown
    { emoji: "⭐", bg: "linear-gradient(180deg,#bae6fd,#38bdf8)" }, // star
  ];

  const LEVELS = [
    { n: 1, title: "The Shepherd Boy",
      story: "David was the youngest, watching over his father's sheep. He was small — but God saw a brave heart.",
      hp: 12, moves: 18,
      verse: { t: "Be strong and courageous. Do not be afraid, for the Lord your God is with you wherever you go.", r: "Joshua 1:9" } },
    { n: 2, title: "Off to the Camp",
      story: "David's father sent him to bring bread to his brothers, who were with the army facing the Philistines.",
      hp: 20, moves: 20,
      verse: { t: "The Lord who saved me from the lion and the bear will save me from this giant.", r: "1 Samuel 17:37" } },
    { n: 3, title: "Five Smooth Stones",
      story: "David chose five smooth stones from the stream and put them in his shepherd's bag. No armor — just faith.",
      hp: 30, moves: 22,
      verse: { t: "My help comes from the Lord, the Maker of heaven and earth.", r: "Psalm 121:2" } },
    { n: 4, title: "Facing the Giant",
      story: "Goliath laughed at the shepherd boy. But David ran toward the battle line, not away from it.",
      hp: 42, moves: 24,
      verse: { t: "You come against me with sword and spear, but I come in the name of the Lord Almighty.", r: "1 Samuel 17:45" } },
    { n: 5, title: "The Battle Is the Lord's",
      story: "David swung his sling, and trusted God for the rest. One small stone, one big God.",
      hp: 60, moves: 28,
      verse: { t: "The battle belongs to the Lord, and he will give all of you into our hands!", r: "1 Samuel 17:47" } },
  ];

  const CHEERS = ["Nice!", "Great match!", "Mighty!", "Combo!", "Wonderful!", "Bullseye!", "Brave!", "The Lord is with you!"];

  /* ---------------- Save data ---------------- */
  const SKEY = "davidGiant_v1";
  let save = loadSave();
  function loadSave() {
    try { return Object.assign({ best: 0, unlocked: 0, mute: false }, JSON.parse(localStorage.getItem(SKEY) || "{}")); }
    catch (e) { return { best: 0, unlocked: 0, mute: false }; }
  }
  function persist() { try { localStorage.setItem(SKEY, JSON.stringify(save)); } catch (e) {} }

  /* ---------------- DOM refs ---------------- */
  const $ = (id) => document.getElementById(id);
  const startScreen = $("startScreen"), gameScreen = $("gameScreen");
  const boardEl = $("board"), boardWrap = $("boardWrap");
  const modal = $("modal"), toast = $("toast");
  const giantEl = $("giant"), davidEl = $("david");
  const hpFill = $("hpFill"), hpText = $("hpText");
  const hudLevel = $("hudLevel"), hudScore = $("hudScore"), hudMoves = $("hudMoves"), hudBest = $("hudBest");

  /* ---------------- Audio (Web Audio, no files) ---------------- */
  let audioCtx = null;
  function ac() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return audioCtx; }
  function beep(freq, dur, type, vol, slideTo) {
    if (save.mute) return;
    const ctx = ac(); if (!ctx) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  }
  const sfx = {
    select: () => beep(520, 0.06, "sine", 0.08),
    pop: (i) => beep(440 + (i || 0) * 70, 0.12, "triangle", 0.12),
    bad: () => beep(180, 0.18, "sawtooth", 0.08, 120),
    sling: () => beep(300, 0.25, "sawtooth", 0.12, 760),
    hit: () => beep(150, 0.2, "square", 0.14, 90),
    win: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.22, "triangle", 0.14), i * 130)); },
    lose: () => { [330, 262, 196].forEach((f, i) => setTimeout(() => beep(f, 0.3, "sine", 0.12), i * 160)); },
  };

  /* ---------------- Game state ---------------- */
  let grid = [];            // grid[r][c] = {id,type} | null
  let els = new Map();      // id -> element
  let nextId = 1;
  let cell = 40;            // px per cell (computed)
  let busy = false, selected = null;
  let st = null;            // current level runtime state

  /* ---------------- Sizing ---------------- */
  function computeCell() {
    const avail = Math.min(window.innerWidth, 520) - 24;
    cell = Math.max(34, Math.floor(Math.min(avail, 440) / COLS));
    const px = cell * COLS;
    boardEl.style.width = px + "px";
    boardEl.style.height = px + "px";
    boardWrap.style.width = px + "px";
    boardWrap.style.height = px + "px";
  }
  function placeEl(el, r, c) {
    const pos = `translate(${c * cell}px, ${r * cell}px)`;
    el.style.setProperty("--pos", pos);
    el.style.transform = pos;
  }
  function styleTile(el, type) {
    el.style.width = cell + "px";
    el.style.height = cell + "px";
    el.style.padding = Math.round(cell * 0.08) + "px";
    el.style.background = TILE[type].bg;
    el.querySelector(".face").style.fontSize = Math.round(cell * 0.55) + "px";
  }

  /* ---------------- Board helpers ---------------- */
  const randType = () => Math.floor(Math.random() * TYPES);

  function makeTileEl(tile, r, c) {
    const el = document.createElement("div");
    el.className = "tile";
    el.dataset.id = tile.id;
    const face = document.createElement("span");
    face.className = "face";
    face.textContent = TILE[tile.type].emoji;
    el.appendChild(face);
    styleTile(el, tile.type);
    placeEl(el, r, c);
    boardEl.appendChild(el);
    void el.offsetWidth; // force reflow so future moves animate
    els.set(tile.id, el);
    return el;
  }

  function newBoard() {
    boardEl.innerHTML = "";
    els.clear();
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        let t;
        do { t = randType(); } while (
          (c >= 2 && grid[r][c - 1].type === t && grid[r][c - 2].type === t) ||
          (r >= 2 && grid[r - 1][c].type === t && grid[r - 2][c].type === t)
        );
        const tile = { id: nextId++, type: t };
        grid[r][c] = tile;
        makeTileEl(tile, r, c);
      }
    }
  }

  function render() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        if (t) { const el = els.get(t.id); if (el) placeEl(el, r, c); }
      }
  }

  function findMatches() {
    const set = new Set();
    // horizontal
    for (let r = 0; r < ROWS; r++) {
      let run = 1;
      for (let c = 1; c <= COLS; c++) {
        const same = c < COLS && grid[r][c] && grid[r][c - 1] && grid[r][c].type === grid[r][c - 1].type;
        if (same) run++;
        else { if (run >= 3) for (let k = c - run; k < c; k++) set.add(r + "," + k); run = 1; }
      }
    }
    // vertical
    for (let c = 0; c < COLS; c++) {
      let run = 1;
      for (let r = 1; r <= ROWS; r++) {
        const same = r < ROWS && grid[r][c] && grid[r - 1][c] && grid[r][c].type === grid[r - 1][c].type;
        if (same) run++;
        else { if (run >= 3) for (let k = r - run; k < r; k++) set.add(k + "," + c); run = 1; }
      }
    }
    return set;
  }

  function hasAnyMove() {
    // quick check: any adjacent swap creates a match
    const swapCheck = (r1, c1, r2, c2) => {
      const a = grid[r1][c1], b = grid[r2][c2];
      grid[r1][c1] = b; grid[r2][c2] = a;
      const ok = findMatches().size > 0;
      grid[r1][c1] = a; grid[r2][c2] = b;
      return ok;
    };
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        if (c < COLS - 1 && swapCheck(r, c, r, c + 1)) return true;
        if (r < ROWS - 1 && swapCheck(r, c, r + 1, c)) return true;
      }
    return false;
  }

  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));

  /* ---------------- Core resolve loop ---------------- */
  async function resolve() {
    let cascade = 0, totalStones = 0;
    while (true) {
      const matches = findMatches();
      if (matches.size === 0) break;
      cascade++;
      let stones = 0, pts = 0;
      matches.forEach((key) => {
        const [r, c] = key.split(",").map(Number);
        const tile = grid[r][c];
        if (tile.type === STONE) { stones++; pts += 10; } else { pts += 5; }
      });
      addScore(pts * cascade);
      totalStones += stones;

      if (cascade >= 2 || matches.size >= 5) showToast(pick(CHEERS));

      // pop animation
      matches.forEach((key) => {
        const [r, c] = key.split(",").map(Number);
        const el = els.get(grid[r][c].id);
        if (el) el.classList.add("pop");
      });
      sfx.pop(cascade);
      await sleep(220);

      // remove
      matches.forEach((key) => {
        const [r, c] = key.split(",").map(Number);
        const tile = grid[r][c];
        const el = els.get(tile.id);
        if (el) el.remove();
        els.delete(tile.id);
        grid[r][c] = null;
      });

      if (stones > 0) await slingStones(stones);

      applyGravity();
      render();
      await sleep(320);
    }
    busy = false;
    afterTurn();
    return totalStones;
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let write = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c]) {
          if (r !== write) { grid[write][c] = grid[r][c]; grid[r][c] = null; }
          write--;
        }
      }
      let spawn = -1;
      for (let r = write; r >= 0; r--) {
        const tile = { id: nextId++, type: randType() };
        grid[r][c] = tile;
        makeTileEl(tile, spawn, c); // start above the board, will fall in on render()
        spawn--;
      }
    }
  }

  /* ---------------- Goliath / sling ---------------- */
  async function slingStones(count) {
    sfx.sling();
    davidEl.classList.add("throw");
    setTimeout(() => davidEl.classList.remove("throw"), 400);

    const appRect = $("app").getBoundingClientRect();
    const dRect = davidEl.getBoundingClientRect();
    const gRect = giantEl.getBoundingClientRect();
    const flyN = Math.min(count, 6);
    for (let i = 0; i < flyN; i++) {
      const s = document.createElement("div");
      s.className = "fly-stone"; s.textContent = "🪨";
      s.style.left = (dRect.left - appRect.left) + "px";
      s.style.top = (dRect.top - appRect.top) + "px";
      $("app").appendChild(s);
      const dx = (gRect.left - dRect.left) + (Math.random() * 20 - 10);
      const dy = (gRect.top - dRect.top) + (Math.random() * 20 - 10);
      requestAnimationFrame(() => {
        s.style.transform = `translate(${dx}px, ${dy}px) rotate(540deg)`;
        s.style.opacity = "0.2";
      });
      setTimeout(() => s.remove(), 500);
    }

    await sleep(360);
    st.hp = Math.max(0, st.hp - count);
    sfx.hit();
    giantEl.classList.remove("hit"); void giantEl.offsetWidth; giantEl.classList.add("hit");
    updateHP();
    await sleep(150);
  }

  function updateHP() {
    const pct = st.maxhp ? (st.hp / st.maxhp) * 100 : 0;
    hpFill.style.width = pct + "%";
    hpText.textContent = st.hp + "/" + st.maxhp;
  }

  /* ---------------- Scoring & HUD ---------------- */
  function addScore(n) {
    st.score += n;
    if (st.score > save.best) { save.best = st.score; persist(); }
    updateHUD();
  }
  function updateHUD() {
    hudLevel.textContent = st.level + 1;
    hudScore.textContent = st.score;
    hudMoves.textContent = st.moves;
    hudMoves.classList.toggle("low", st.moves <= 3);
    hudBest.textContent = save.best;
  }

  /* ---------------- Turn flow ---------------- */
  function afterTurn() {
    if (st.hp <= 0) { winLevel(); return; }
    if (st.moves <= 0) { loseLevel(); return; }
    if (!hasAnyMove()) { reshuffle(); }
  }

  async function reshuffle() {
    busy = true;
    showToast("Shuffling…");
    await sleep(400);
    newBoard();
    render();
    let guard = 0;
    while (findMatches().size > 0 && guard++ < 20) { applyGravity(); }
    await sleep(300);
    busy = false;
  }

  /* ---------------- Input ---------------- */
  function cellFromEvent(e) {
    const rect = boardEl.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const c = Math.floor(x / cell), r = Math.floor(y / cell);
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
    return { r, c };
  }
  function selEl(r, c, on) {
    const t = grid[r][c]; if (!t) return;
    const el = els.get(t.id); if (el) el.classList.toggle("sel", on);
  }
  function clearSel() { if (selected) { selEl(selected.r, selected.c, false); selected = null; } }

  async function onPick(e) {
    if (busy) return;
    const cellPos = cellFromEvent(e);
    if (!cellPos) { clearSel(); return; }
    const { r, c } = cellPos;
    if (!selected) { selected = { r, c }; selEl(r, c, true); sfx.select(); return; }
    if (selected.r === r && selected.c === c) { clearSel(); return; }
    const adj = Math.abs(selected.r - r) + Math.abs(selected.c - c) === 1;
    if (!adj) { clearSel(); selected = { r, c }; selEl(r, c, true); sfx.select(); return; }
    const a = selected; clearSel();
    await trySwap(a.r, a.c, r, c);
  }

  async function trySwap(r1, c1, r2, c2) {
    busy = true;
    const t1 = grid[r1][c1], t2 = grid[r2][c2];
    grid[r1][c1] = t2; grid[r2][c2] = t1;
    render();
    await sleep(300);
    if (findMatches().size === 0) {
      // invalid - swap back
      sfx.bad();
      grid[r1][c1] = t1; grid[r2][c2] = t2;
      const e1 = els.get(t1.id), e2 = els.get(t2.id);
      if (e1) { e1.classList.add("bad"); setTimeout(() => e1.classList.remove("bad"), 300); }
      if (e2) { e2.classList.add("bad"); setTimeout(() => e2.classList.remove("bad"), 300); }
      render();
      await sleep(300);
      busy = false;
      return;
    }
    st.moves--;
    updateHUD();
    await resolve();
  }

  // pointer (covers mouse + touch). Use pointerdown for snappy taps.
  boardEl.addEventListener("pointerdown", (e) => { e.preventDefault(); onPick(e); });

  /* ---------------- Toast ---------------- */
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.remove("show"); void toast.offsetWidth; toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1100);
  }
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  /* ---------------- Level lifecycle ---------------- */
  function startLevel(idx) {
    const L = LEVELS[idx];
    st = { level: idx, score: st ? st.score : 0, moves: L.moves, hp: L.hp, maxhp: L.hp };
    computeCell();
    giantEl.classList.remove("defeated");
    giantEl.style.transform = "";
    updateHP();
    updateHUD();
    newBoard();
    let guard = 0;
    while (findMatches().size > 0 && guard++ < 30) { applyGravity(); }
    render();
    busy = false; selected = null;
  }

  function showLevelIntro(idx) {
    const L = LEVELS[idx];
    openModal({
      emoji: "📜",
      title: "Level " + L.n + ": " + L.title,
      bodyHtml: "<p>" + L.story + "</p>",
      buttons: [{ label: "Begin ▶", cls: "btn", onClick: () => { closeModal(); startLevel(idx); } }],
    });
  }

  function winLevel() {
    sfx.win();
    giantEl.classList.add("defeated");
    const idx = st.level, L = LEVELS[idx];
    save.unlocked = Math.max(save.unlocked, Math.min(idx + 1, LEVELS.length - 1));
    if (st.score > save.best) save.best = st.score;
    persist();
    const last = idx >= LEVELS.length - 1;
    setTimeout(() => {
      openModal({
        emoji: last ? "👑" : "🎉",
        title: last ? "Victory!" : "Goliath Falls!",
        bodyHtml:
          (last
            ? "<p>You followed David's whole story and won the battle. Well done, mighty one!</p>"
            : "<p>The giant is down! On to the next part of the story.</p>") +
          "<div class='stars'>⭐⭐⭐</div>" +
          scriptureHtml(L.verse),
        buttons: last
          ? [
              { label: "Play Again", cls: "btn", onClick: () => { st.score = 0; closeModal(); showLevelIntro(0); } },
              { label: "Home", cls: "btn secondary", onClick: goHome },
            ]
          : [
              { label: "Next Level ▶", cls: "btn", onClick: () => { closeModal(); showLevelIntro(idx + 1); } },
              { label: "Home", cls: "btn secondary", onClick: goHome },
            ],
      });
    }, 800);
  }

  function loseLevel() {
    sfx.lose();
    const idx = st.level;
    openModal({
      emoji: "💪",
      title: "Out of Moves!",
      bodyHtml:
        "<p>Goliath is still standing — but David never gave up, and neither should you!</p>" +
        scriptureHtml({ t: "Have I not commanded you? Be strong and courageous!", r: "Joshua 1:9" }),
      buttons: [
        { label: "Try Again", cls: "btn", onClick: () => { closeModal(); showLevelIntro(idx); } },
        { label: "Home", cls: "btn secondary", onClick: goHome },
      ],
    });
  }

  function scriptureHtml(v) {
    return "<div class='scripture'>“" + v.t + "”<span class='ref'>— " + v.r + "</span></div>";
  }

  /* ---------------- Modal ---------------- */
  function openModal(cfg) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      "<div class='emoji'>" + (cfg.emoji || "✨") + "</div>" +
      "<h2>" + cfg.title + "</h2>" +
      (cfg.bodyHtml || "");
    const actions = document.createElement("div");
    actions.className = "actions";
    (cfg.buttons || []).forEach((b) => {
      const btn = document.createElement("button");
      btn.className = b.cls || "btn";
      btn.textContent = b.label;
      btn.addEventListener("click", b.onClick);
      actions.appendChild(btn);
    });
    card.appendChild(actions);
    modal.innerHTML = "";
    modal.appendChild(card);
    modal.classList.remove("hidden");
  }
  function closeModal() { modal.classList.add("hidden"); modal.innerHTML = ""; }

  /* ---------------- Navigation ---------------- */
  function showScreen(el) {
    [startScreen, gameScreen].forEach((s) => s.classList.add("hidden"));
    el.classList.remove("hidden");
  }
  function goHome() {
    closeModal();
    refreshStartButtons();
    showScreen(startScreen);
  }
  function beginGame(fromLevel) {
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    ac();
    st = { score: 0 };
    showScreen(gameScreen);
    showLevelIntro(fromLevel);
  }

  function refreshStartButtons() {
    const cont = $("continueBtn");
    if (save.unlocked > 0) { cont.style.display = ""; cont.textContent = "Continue (Level " + (save.unlocked + 1) + ")"; }
    else cont.style.display = "none";
  }

  /* ---------------- Sound toggle ---------------- */
  function updateMuteIcons() {
    const icon = save.mute ? "🔇" : "🔊";
    $("muteBtn").textContent = icon;
    $("muteBtnStart").textContent = icon;
  }
  function toggleMute() { save.mute = !save.mute; persist(); updateMuteIcons(); if (!save.mute) sfx.select(); }

  /* ---------------- How to play ---------------- */
  function showHow() {
    openModal({
      emoji: "🪨",
      title: "How to Play",
      bodyHtml:
        "<p style='text-align:left'>" +
        "• Tap a tile, then tap a neighbor to <b>swap</b> them.<br><br>" +
        "• Line up <b>3 or more</b> of the same tile to clear them.<br><br>" +
        "• Every <b>🪨 stone</b> you match is slung at <b>Goliath</b> — empty his health bar to win!<br><br>" +
        "• Watch your <b>moves</b>. Big combos score more. Trust God and aim true!" +
        "</p>",
      buttons: [{ label: "Got it!", cls: "btn", onClick: closeModal }],
    });
  }

  /* ---------------- Wire up ---------------- */
  $("playBtn").addEventListener("click", () => { st = { score: 0 }; beginGame(0); });
  $("continueBtn").addEventListener("click", () => beginGame(save.unlocked));
  $("howBtn").addEventListener("click", showHow);
  $("homeBtn").addEventListener("click", () => {
    openModal({
      emoji: "🏠", title: "Leave the battle?",
      bodyHtml: "<p>Your best score is saved. Head back home?</p>",
      buttons: [
        { label: "Yes, go home", cls: "btn", onClick: goHome },
        { label: "Keep playing", cls: "btn secondary", onClick: closeModal },
      ],
    });
  });
  $("muteBtn").addEventListener("click", toggleMute);
  $("muteBtnStart").addEventListener("click", toggleMute);

  let resizeT = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => { if (!gameScreen.classList.contains("hidden")) { computeCell(); render(); } }, 150);
  });

  // boot
  updateMuteIcons();
  refreshStartButtons();
})();
</script>
</body>
</html>
